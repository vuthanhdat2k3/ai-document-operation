# =============================================================================
# AI Document Operations Agent - Docker Compose (Development)
# =============================================================================

services:
  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: docops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-docops}
      POSTGRES_USER: ${POSTGRES_USER:-docops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docops-secret}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docops}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docops-net

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: docops-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-docops-redis}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-docops-redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docops-net

  # --- Qdrant (Vector Database) ---
  qdrant:
    image: qdrant/qdrant:latest
    container_name: docops-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - docops-net

  # --- MinIO (Object Storage) ---
  minio:
    image: minio/minio:latest
    container_name: docops-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9000' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - docops-net

  # --- Backend API ---
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: docops-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-docops}:${POSTGRES_PASSWORD:-docops-secret}@postgres:5432/${POSTGRES_DB:-docops}
      REDIS_URL: redis://:${REDIS_PASSWORD:-docops-redis}@redis:6379/0
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      MINIO_ENDPOINT: minio:9000
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 10s
      retries: 3
    networks:
      - docops-net

  # --- Background Worker ---
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: docops-worker
    restart: unless-stopped
    command: arq app.workers.task_queue.WorkerSettings
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-docops}:${POSTGRES_PASSWORD:-docops-secret}@postgres:5432/${POSTGRES_DB:-docops}
      REDIS_URL: redis://:${REDIS_PASSWORD:-docops-redis}@redis:6379/0
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      MINIO_ENDPOINT: minio:9000
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - docops-net

  # --- Frontend ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: docops-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    networks:
      - docops-net

  # --- Langfuse (LLM Observability) ---
  # Disabled: Langfuse v3 requires ClickHouse. Enable with: docker compose --profile langfuse up
  langfuse:
    image: langfuse/langfuse:latest
    container_name: docops-langfuse
    restart: unless-stopped
    profiles:
      - langfuse
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: ${APP_SECRET_KEY:-change-me}
      SALT: ${APP_SECRET_KEY:-change-me}
    depends_on:
      - postgres
    networks:
      - docops-net

  # --- OpenTelemetry Collector ---
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: docops-otel
    restart: unless-stopped
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Prometheus metrics
    volumes:
      - ./deploy/otel-collector.yaml:/etc/otelcol-contrib/config.yaml
    networks:
      - docops-net

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  upload_data:

networks:
  docops-net:
    driver: bridge
